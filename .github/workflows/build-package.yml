name: Build Package

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Build package
        run: uv build

      - name: Smoke test wheel
        run: python scripts/smoke_wheel.py

      - name: Record release tag
        run: printf '%s\n' "$GITHUB_REF_NAME" > dist/release-tag.txt

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-${{ github.ref_name }}
          path: dist/*
          retention-days: 90
